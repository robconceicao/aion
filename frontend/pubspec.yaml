name: aion
description: A premium dream analysis platform based on Jungian psychology.
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  dio: ^5.3.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  google_fonts: ^6.1.0
  fl_chart: ^0.65.0
  glassmorphism: ^3.0.0
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  record: ^5.1.0
  path_provider: ^2.1.1
  permission_handler: ^11.1.0

dependency_overrides:
  record_linux: ^1.3.0
  record_android: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.7
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
